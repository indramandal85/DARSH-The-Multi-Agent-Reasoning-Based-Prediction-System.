<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" fill="none">
  <title>DARSH README Header</title>
  <style>
    .orbit-slow { animation: orbitSlow 20s linear infinite; transform-origin: 140px 126px; }
    .orbit-fast { animation: orbitFast 13s linear infinite; transform-origin: 140px 126px; }
    .pulse-core { animation: pulseCore 4.8s ease-in-out infinite; transform-origin: 140px 126px; }
    .mesh { animation: meshBreath 6s ease-in-out infinite; transform-origin: 140px 126px; }
    .word-sheen { animation: wordSheen 5.8s ease-in-out infinite; }
    .signal { animation: signalFloat 5.5s ease-in-out infinite; }
    @keyframes orbitSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes orbitFast { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulseCore {
      0%, 100% { transform: scale(1); opacity: 0.94; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes meshBreath {
      0%, 100% { transform: scale(1); opacity: 0.68; }
      50% { transform: scale(1.035); opacity: 0.96; }
    }
    @keyframes wordSheen {
      0%, 100% { opacity: 0; transform: translateX(-150px); }
      22% { opacity: 0; }
      46% { opacity: 0.96; }
      62% { opacity: 0; transform: translateX(250px); }
    }
    @keyframes signalFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
  </style>
  <defs>
    <radialGradient id="stageGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(460 140) rotate(90) scale(190 420)">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbitStroke" x1="34" y1="44" x2="246" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5ed9ff"/>
      <stop offset="0.5" stop-color="#7d73ff"/>
      <stop offset="1" stop-color="#ef7dff"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop stop-color="#253252"/>
      <stop offset="0.26" stop-color="#356fca"/>
      <stop offset="0.48" stop-color="#69cbff"/>
      <stop offset="0.74" stop-color="#7f6dff"/>
      <stop offset="1" stop-color="#b785ff"/>
    </linearGradient>
    <linearGradient id="wordSheenFill" x1="0" y1="0" x2="170" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#f6fdff" stop-opacity="0.92"/>
      <stop offset="0.58" stop-color="#dff6ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordUnderline" x1="304" y1="205" x2="716" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6be0ff" stop-opacity="0.12"/>
      <stop offset="0.2" stop-color="#6be0ff"/>
      <stop offset="0.54" stop-color="#8d78ff"/>
      <stop offset="0.88" stop-color="#f08cff"/>
      <stop offset="1" stop-color="#f08cff" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="irisFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 126) rotate(90) scale(54)">
      <stop offset="0" stop-color="#09123b"/>
      <stop offset="0.34" stop-color="#2049b8"/>
      <stop offset="0.64" stop-color="#4dc9ff"/>
      <stop offset="1" stop-color="#a178ff"/>
    </radialGradient>
    <radialGradient id="innerHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 126) rotate(90) scale(34)">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#a6f0ff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 126) rotate(90) scale(126)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.3" stop-color="#dff4ff" stop-opacity="0.82"/>
      <stop offset="0.7" stop-color="#8f91ff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#f0b6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="280" rx="36" fill="url(#stageGlow)"/>

  <circle cx="140" cy="126" r="118" fill="url(#iconGlow)"/>

  <g class="orbit-slow" filter="url(#softGlow)">
    <ellipse cx="140" cy="126" rx="112" ry="72" stroke="url(#orbitStroke)" stroke-width="3.6" opacity="0.82"/>
    <circle cx="140" cy="18" r="10" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="4"/>
    <circle cx="44" cy="96" r="8.2" fill="#f8fcff" stroke="url(#orbitStroke)" stroke-width="3.4"/>
    <circle cx="238" cy="160" r="9.2" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="4"/>
  </g>

  <g class="orbit-fast" filter="url(#softGlow)">
    <ellipse cx="140" cy="126" rx="102" ry="58" stroke="url(#orbitStroke)" stroke-width="2.7" opacity="0.54" transform="rotate(-24 140 126)"/>
    <ellipse cx="140" cy="126" rx="102" ry="58" stroke="url(#orbitStroke)" stroke-width="2.7" opacity="0.42" transform="rotate(28 140 126)"/>
    <circle cx="238" cy="110" r="7.4" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="3"/>
    <circle cx="90" cy="32" r="6.6" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="2.7"/>
  </g>

  <g filter="url(#strongGlow)">
    <path d="M54 126C79 90 110 72 140 72C170 72 201 90 226 126C201 162 170 180 140 180C110 180 79 162 54 126Z" fill="#ffffff" fill-opacity="0.08" stroke="url(#orbitStroke)" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <g class="mesh">
    <circle cx="140" cy="126" r="49" fill="url(#irisFill)" opacity="0.98"/>
    <circle cx="140" cy="126" r="26" fill="#071134"/>
    <circle cx="140" cy="126" r="34" fill="url(#innerHalo)" opacity="0.84"/>
    <g stroke="#dff8ff" stroke-opacity="0.58" stroke-width="1.6">
      <path d="M106 117L122 99L151 97L171 113L170 143L146 157L116 150L106 117Z"/>
      <path d="M122 99L136 113L151 97"/>
      <path d="M136 113L170 143"/>
      <path d="M116 150L136 113L146 157"/>
      <path d="M106 117L136 113L171 113"/>
    </g>
    <g fill="#f4fcff">
      <circle cx="122" cy="99" r="2.7"/>
      <circle cx="151" cy="97" r="2.7"/>
      <circle cx="171" cy="113" r="2.7"/>
      <circle cx="170" cy="143" r="2.7"/>
      <circle cx="146" cy="157" r="2.7"/>
      <circle cx="116" cy="150" r="2.7"/>
      <circle cx="106" cy="117" r="2.7"/>
      <circle cx="136" cy="113" r="3"/>
    </g>
  </g>

  <g class="pulse-core" filter="url(#softGlow)">
    <circle cx="140" cy="126" r="12" fill="#0a1237"/>
    <circle cx="158" cy="108" r="7" fill="#ffffff" fill-opacity="0.96"/>
    <circle cx="126" cy="119" r="4.6" fill="#8fe8ff" fill-opacity="0.9"/>
  </g>

  <g class="signal" filter="url(#softGlow)">
    <circle cx="30" cy="162" r="4.3" fill="#ffffff" fill-opacity="0.9"/>
    <circle cx="44" cy="172" r="2.4" fill="#7fdfff"/>
    <circle cx="250" cy="66" r="4" fill="#ffffff" fill-opacity="0.86"/>
  </g>

  <g transform="translate(298 46)">
    <text x="0" y="90" fill="url(#wordAccent)" font-size="94" font-weight="900" letter-spacing="-4.3" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">DARSH</text>
    <text x="0" y="90" fill="#ffffff" opacity="0.08" filter="url(#softGlow)" font-size="94" font-weight="900" letter-spacing="-4.3" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">DARSH</text>
    <text x="3" y="132" fill="#6576aa" font-size="16" font-weight="700" letter-spacing="4.2" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">PRE-DECISION BEHAVIORAL INTELLIGENCE</text>
    <rect x="2" y="164" width="404" height="4" rx="2" fill="url(#wordUnderline)"/>
    <g class="word-sheen">
      <rect x="-18" y="0" width="170" height="188" fill="url(#wordSheenFill)" transform="skewX(-18)"/>
    </g>
  </g>
</svg>
