<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <title>DARSH mark</title>
  <style>
    .orbit-slow { animation: orbitSlow 22s linear infinite; transform-origin: 150px 150px; }
    .orbit-fast { animation: orbitFast 14s linear infinite; transform-origin: 150px 150px; }
    .pulse-core { animation: pulseCore 4.8s ease-in-out infinite; transform-origin: 150px 150px; }
    .glint { animation: glint 3.4s ease-in-out infinite; }
    .mesh { animation: meshBreath 6s ease-in-out infinite; transform-origin: 150px 150px; }
    .signal { animation: signalFloat 5.5s ease-in-out infinite; }
    @keyframes orbitSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes orbitFast { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulseCore {
      0%, 100% { transform: scale(1); opacity: 0.94; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @keyframes glint {
      0%, 100% { opacity: 0.32; }
      50% { opacity: 0.9; }
    }
    @keyframes meshBreath {
      0%, 100% { transform: scale(1); opacity: 0.68; }
      50% { transform: scale(1.035); opacity: 0.96; }
    }
    @keyframes signalFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
  </style>
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 150) rotate(90) scale(120)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.3" stop-color="#dff4ff" stop-opacity="0.84"/>
      <stop offset="0.68" stop-color="#8f91ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#f0b6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orbitStroke" x1="32" y1="54" x2="266" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5ed9ff"/>
      <stop offset="0.5" stop-color="#7d73ff"/>
      <stop offset="1" stop-color="#ef7dff"/>
    </linearGradient>
    <linearGradient id="eyeStroke" x1="70" y1="95" x2="228" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#80e6ff"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ef94ff"/>
    </linearGradient>
    <radialGradient id="irisFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 150) rotate(90) scale(58)">
      <stop offset="0" stop-color="#09123b"/>
      <stop offset="0.34" stop-color="#2049b8"/>
      <stop offset="0.64" stop-color="#4dc9ff"/>
      <stop offset="1" stop-color="#a178ff"/>
    </radialGradient>
    <radialGradient id="innerHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 150) rotate(90) scale(32)">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.36" stop-color="#a6f0ff"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="150" cy="150" r="116" fill="url(#bgGlow)"/>

  <g class="orbit-slow" filter="url(#softGlow)">
    <ellipse cx="150" cy="150" rx="118" ry="76" stroke="url(#orbitStroke)" stroke-width="3.5" opacity="0.82"/>
    <circle cx="150" cy="33" r="11" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="4"/>
    <circle cx="48" cy="119" r="9" fill="#f8fcff" stroke="url(#orbitStroke)" stroke-width="3.5"/>
    <circle cx="248" cy="187" r="10" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="4"/>
  </g>

  <g class="orbit-fast" filter="url(#softGlow)">
    <ellipse cx="150" cy="150" rx="108" ry="58" stroke="url(#orbitStroke)" stroke-width="2.8" opacity="0.54" transform="rotate(-24 150 150)"/>
    <ellipse cx="150" cy="150" rx="108" ry="58" stroke="url(#orbitStroke)" stroke-width="2.8" opacity="0.42" transform="rotate(26 150 150)"/>
    <circle cx="252" cy="132" r="8" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="3.5"/>
    <circle cx="74" cy="232" r="9" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="3.5"/>
    <circle cx="102" cy="54" r="7" fill="#ffffff" stroke="url(#orbitStroke)" stroke-width="3"/>
  </g>

  <g filter="url(#strongGlow)">
    <path d="M62 150C88 113 119 92 150 92C181 92 212 113 238 150C212 187 181 208 150 208C119 208 88 187 62 150Z" fill="#ffffff" fill-opacity="0.08" stroke="url(#eyeStroke)" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <g class="mesh">
    <circle cx="150" cy="150" r="52" fill="url(#irisFill)" opacity="0.98"/>
    <circle cx="150" cy="150" r="28" fill="#071134"/>
    <circle cx="150" cy="150" r="35" fill="url(#innerHalo)" opacity="0.85"/>

    <g stroke="#dff8ff" stroke-opacity="0.58" stroke-width="1.6">
      <path d="M114 139L132 121L160 118L182 136L180 168L154 182L124 173L114 139Z"/>
      <path d="M132 121L146 136L160 118"/>
      <path d="M146 136L180 168"/>
      <path d="M124 173L146 136L154 182"/>
      <path d="M114 139L146 136L182 136"/>
    </g>
    <g fill="#f4fcff">
      <circle cx="132" cy="121" r="3"/>
      <circle cx="160" cy="118" r="3"/>
      <circle cx="182" cy="136" r="3"/>
      <circle cx="180" cy="168" r="3"/>
      <circle cx="154" cy="182" r="3"/>
      <circle cx="124" cy="173" r="3"/>
      <circle cx="114" cy="139" r="3"/>
      <circle cx="146" cy="136" r="3.2"/>
    </g>
  </g>

  <g class="pulse-core" filter="url(#softGlow)">
    <circle cx="150" cy="150" r="13" fill="#0a1237"/>
    <circle cx="169" cy="131" r="8" fill="#ffffff" fill-opacity="0.96"/>
    <circle cx="133" cy="142" r="5" fill="#8fe8ff" fill-opacity="0.9"/>
  </g>

  <g class="signal" filter="url(#softGlow)">
    <circle cx="40" cy="193" r="5" fill="#ffffff" fill-opacity="0.9"/>
    <circle cx="54" cy="206" r="2.6" fill="#7fdfff"/>
    <circle cx="258" cy="90" r="4.8" fill="#ffffff" fill-opacity="0.88"/>
    <circle cx="240" cy="77" r="2.8" fill="#ef9cff"/>
  </g>

  <g class="glint" filter="url(#softGlow)">
    <path d="M148 56L154 70L170 72L158 82L160 98L148 89L136 98L138 82L126 72L142 70Z" fill="#ffffff" fill-opacity="0.7"/>
  </g>
</svg>
